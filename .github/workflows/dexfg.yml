name: DEXFG CI

on:
  push:
    branches: [main]
    paths:
      - 'swapxfgui/**'
      - 'mm2src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/dexfg.yml'
  pull_request:
    branches: [main]
    paths:
      - 'swapxfgui/**'
      - 'mm2src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

concurrency:
  group: dexfg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mm2:
    name: Build mm2_xfg
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2025-06-01
          components: rustfmt, clippy

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mm2-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build mm2_xfg
        run: |
          rustup override set nightly-2025-06-01
          cargo build --release -p mm2_bin_lib
          cp target/release/kdf mm2_xfg

      - uses: actions/upload-artifact@v4
        with:
          name: mm2_xfg-linux-x64
          path: |
            mm2_xfg

  swapxfgui:
    name: Build swapxfgui
    needs: mm2
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/swapxfgui/ci_tools_atomic_dex/vcpkg-repo
      VCPKG_DEFAULT_TRIPLET: x64-linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: mm2_xfg-linux-x64
          path: /tmp/mm2_artifacts

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg
            swapxfgui/ci_tools_atomic_dex/vcpkg-repo/installed
            swapxfgui/ci_tools_atomic_dex/vcpkg-repo/downloads
            swapxfgui/ci_tools_atomic_dex/vcpkg-repo/packages
          key: vcpkg-${{ runner.os }}-${{ hashFiles('swapxfgui/vcpkg.json') }}

      - name: Install Qt5 + system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qtbase5-dev qtwebengine5-dev qtdeclarative5-dev \
            libqt5svg5-dev libqt5charts5-dev \
            qt5-qmake qtwebengine5-dev-tools \
            qttools5-dev qttools5-dev-tools \
            libgl1-mesa-dev libxkbcommon-dev \
            autoconf autoconf-archive automake libtool

      - name: Bootstrap vcpkg
        working-directory: swapxfgui/ci_tools_atomic_dex/vcpkg-repo
        run: |
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Install vcpkg deps
        working-directory: swapxfgui
        run: |
          ./ci_tools_atomic_dex/vcpkg-repo/vcpkg install --triplet x64-linux \
            --overlay-ports=ci_tools_atomic_dex/vcpkg-custom-ports/ports

      - name: Patch mm2 binary
        run: |
          mkdir -p /tmp/mm2_prebuilt
          cp /tmp/mm2_artifacts/mm2_xfg /tmp/mm2_prebuilt/mm2_xfg
          # Create a zip that FetchContent can consume
          cd /tmp/mm2_prebuilt && zip -r mm2.zip mm2_xfg
          # Override: host locally and rewrite FetchContent URL via cmake variable
          echo "MM2_URL=file:///tmp/mm2_prebuilt/mm2.zip" >> $GITHUB_ENV

      - name: Configure cmake
        working-directory: swapxfgui
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_PREFIX_PATH="/usr/lib/x86_64-linux-gnu/cmake/Qt5" \
            -DVCPKG_OVERLAY_PORTS="${GITHUB_WORKSPACE}/swapxfgui/ci_tools_atomic_dex/vcpkg-custom-ports/ports"

      - name: Build
        working-directory: swapxfgui
        run: |
          cmake --build build -j$(nproc)
          # Override the pre-built mm2 with our custom build
          cp /tmp/mm2_artifacts/mm2_xfg build/bin/assets/tools/mm2/mm2_xfg
          chmod +x build/bin/assets/tools/mm2/mm2_xfg

      - name: Package artifacts
        run: |
          mkdir -p release/swapxfg
          cp -r swapxfgui/build/bin/* release/swapxfg/ 2>/dev/null || true
          # If build output is elsewhere
          find swapxfgui/build -name swapxfg -type f -exec cp {} release/swapxfg/ \; 2>/dev/null || true
          find swapxfgui/build -name swapxfg -type f 2>/dev/null
          ls -la release/swapxfg/ 2>/dev/null || echo "No binaries yet"
          # For now just package what we have
          tar -czf swapxfg-linux-x64.tar.gz -C swapxfgui/build . 2>/dev/null || true
          ls -la *.tar.gz 2>/dev/null || echo "No package"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swapxfgui-linux-x64
          path: swapxfg-linux-x64.tar.gz

  fuego_adaptor_tests:
    name: fuego_adaptor tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2025-06-01
          components: rustfmt, clippy

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mm2-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Run fuego_adaptor tests
        run: |
          rustup override set nightly-2025-06-01
          cargo test -p fuego_adaptor
